<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXARION</title>

<style>
  :root {
    --primary: #0a0a0a;
    --gold: #c5a059;
    --sand: #f4f1ea;
    --dark: #232323;
    --white: #ffffff;
    --out-red: #8b0000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #d6d2c4;
    color: var(--dark);
    height: 100vh;
    overflow: hidden; /* Mencegah double scroll di HP */
  }

  /* AUTH SCREEN */
  #auth-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--primary); z-index: 10000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .auth-card {
    background: var(--dark); padding: 30px; border-radius: 16px;
    border: 2px solid var(--gold); text-align: center; width: 100%; max-width: 350px;
  }
  #pass-input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gold);
    margin: 20px 0; text-align: center; font-size: 16px;
  }
  #auth-btn {
    background: var(--gold); color: var(--primary); padding: 12px 25px;
    border: none; border-radius: 8px; font-weight: 800; width: 100%;
  }

  /* MAIN UI FIX */
  .main-wrapper {
    display: none;
    width: 100vw;
    height: 100vh;
    overflow: auto; /* Scroll utama di sini */
    background: var(--white);
    -webkit-overflow-scrolling: touch;
  }

  .grid-table {
    display: grid;
    grid-template-columns: 60px repeat(8, 140px);
    /* Kunci tinggi baris agar tidak melar di HP */
    grid-auto-rows: min-content; 
  }

  .corner {
    position: sticky; top: 0; left: 0; z-index: 1000;
    background: #000; height: 100%; border-bottom: 3px solid var(--gold);
  }

  .player-header {
    position: sticky; top: 0; z-index: 900;
    background: var(--primary);
    padding: 10px 5px;
    border-bottom: 3px solid var(--gold);
    display: flex; flex-direction: column; gap: 5px;
    min-height: 85px; /* Pastikan tinggi header konsisten */
  }

  .label-round {
    position: sticky; left: 0; z-index: 800;
    background: var(--dark) !important;
    color: var(--white) !important;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; height: 55px; /* Tinggi baris ronde */
    border-bottom: 1px solid #444;
  }

  .cycle-separator {
    grid-column: 1 / span 9;
    background: #333;
    color: var(--gold);
    height: 40px; /* KUNCI TINGGI AGAR TIDAK MELAR */
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 11px; letter-spacing: 2px;
    position: sticky; left: 0; z-index: 850;
  }

  .p-input {
    width: 100%; padding: 6px; border: 1px solid var(--gold);
    border-radius: 4px; font-weight: 700; font-size: 13px;
  }

  .status-row { color: white; display: flex; justify-content: space-between; font-size: 10px; }

  select {
    width: 85%; height: 40px; margin: 7px auto;
    border: 1px solid #ccc; border-radius: 6px;
    font-size: 14px; font-weight: 700;
  }

  /* Zebra Stripes */
  .row-p1 { background: #fff; }
  .row-p2 { background: #fdfaf2; }
  .row-p3 { background: #f7f3e9; }
  
  .ghost-mirror { background: #e5e1da !important; border: 2px dashed var(--gold) !important; }
  .is-out-bg { background: var(--out-red) !important; }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2 style="color:var(--gold); font-size:16px">"siapa player paling kece di dunia?"</h2>
    <input type="text" id="pass-input" placeholder="Jawaban..." autocomplete="off">
    <button id="auth-btn" onclick="checkAuth()">MASUK</button>
  </div>
</div>

<div class="main-wrapper" id="tracker-ui">
  <div class="grid-table" id="main-grid">
    <div class="corner"></div>
  </div>
</div>

<script>
function checkAuth() {
  const input = document.getElementById('pass-input').value.toLowerCase().trim();
  if (input === "bet the one and only") {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('tracker-ui').style.display = 'block';
    init();
  } else {
    alert("Jawaban salah!");
  }
}

const grid = document.getElementById('main-grid');
const totalPlayers = 8;
const totalRounds = 21;

function init() {
  grid.innerHTML = '<div class="corner"></div>';
  for(let i=0; i<totalPlayers; i++) {
    let div = document.createElement('div');
    div.className = 'player-header';
    div.id = `h-${i}`;
    div.innerHTML = `
      <input class="p-input" oninput="syncAll()" placeholder="P${i+1}">
      <div class="status-row">
        <label><input type="checkbox" class="out-check" onchange="syncAll()"> OUT</label>
        <input type="number" class="r-dead-input" value="10" oninput="syncAll()" style="width:30px">
      </div>
    `;
    grid.appendChild(div);
  }

  for(let r=1; r<=totalRounds; r++) {
    if(r === 1 || r === 8 || r === 15) {
      let phase = Math.ceil(r / 7);
      let sep = document.createElement('div');
      sep.className = 'cycle-separator';
      sep.innerText = `PHASE ${phase} (R${r}-${r+6})`;
      grid.appendChild(sep);
    }
    let pClass = r <= 7 ? 'row-p1' : (r <= 14 ? 'row-p2' : 'row-p3');
    let label = document.createElement('div');
    label.className = `label-round`;
    label.innerText = 'R' + r;
    grid.appendChild(label);

    for(let c=0; c<totalPlayers; c++) {
      let s = document.createElement('select');
      s.className = `col-${c} round-${r} ${pClass}`;
      s.onchange = syncAll;
      grid.appendChild(s);
    }
  }
}

function syncAll() {
  const inputs = document.querySelectorAll('.p-input');
  const checks = document.querySelectorAll('.out-check');
  const deadInputs = document.querySelectorAll('.r-dead-input');
  const names = [...inputs].map((inp, idx) => inp.value.trim() || `P${idx+1}`);

  let deathData = {};
  names.forEach((n, i) => {
    deathData[n] = { isDead: checks[i].checked, round: parseInt(deadInputs[i].value) || 0 };
    document.getElementById(`h-${i}`).classList.toggle('is-out-bg', checks[i].checked);
  });

  let globalDeaths = [];
  Object.values(deathData).forEach(d => { if(d.isDead) globalDeaths.push(d.round); });

  for(let c=0; c<totalPlayers; c++) {
    let host = names[c];
    let met = [];
    for(let r=1; r<=6; r++) {
      let val = document.querySelector(`.col-${c}.round-${r}`).value;
      if(val) met.push(val);
    }
    for(let r=1; r<=7; r++) {
      let sel = document.querySelector(`.col-${c}.round-${r}`);
      let current = sel.value;
      if(r === 7 && !current) {
        let notMet = names.filter(n => n !== host && !met.includes(n));
        if(notMet.length === 1) current = notMet[0];
      }
      sel.innerHTML = '<option value="">-</option>';
      names.forEach(n => {
        if(n !== host) {
          let o = document.createElement('option');
          o.value = n; o.text = n;
          if(n === current) o.selected = true;
          sel.add(o);
        }
      });
    }
  }

  for(let c=0; c<totalPlayers; c++) {
    let host = names[c];
    let leg1 = [];
    for(let r=1; r<=7; r++) leg1.push(document.querySelector(`.col-${c}.round-${r}`).value);
    let pattern = (leg1[5] && leg1.slice(0, 5).includes(leg1[5])) ? "r6" : 
                  (leg1[6] && leg1.slice(0, 6).includes(leg1[6])) ? "r7" : "normal";
    let leftover = names.filter(n => n !== host).find(n => !leg1.includes(n)) || "";

    let leg2 = (pattern === "r6") ? [leftover, leg1[1], leg1[2], leg1[3], leg1[4], leg1[0], leg1[6]] :
               (pattern === "r7") ? [leftover, leg1[0], leg1[2], leg1[3], leg1[4], leg1[5], leg1[1]] : [...leg1];

    let full = [...leg1, ...leg2, ...leg2];

    for(let r=8; r<=totalRounds; r++) {
      let sel = document.querySelector(`.col-${c}.round-${r}`);
      let idx = r - 1;
      let shiftGlobal = 0;
      globalDeaths.forEach(dr => { if(r >= dr) shiftGlobal++; });
      idx += shiftGlobal;
      let enemy = full[idx];
      let st = enemy ? deathData[enemy] : null;

      sel.classList.remove('ghost-mirror');
      if(st && st.isDead && r > st.round) {
        enemy = full[idx + 3] || ""; 
        sel.classList.add('ghost-mirror');
      }
      sel.innerHTML = `<option value="${enemy || ''}">${enemy || '-'}</option>`;
      sel.value = enemy || "";
    }
  }
}
</script>
</body>
</html>
