<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXARION</title>

<style>
  :root {
    --primary: #0a0a0a2;
    --gold: #c5a059;
    --dark: #232323;
    --white: #ffffff;
    --bg-body: #111111;
    --bg-wrapper: #d6d2c4;
    --out-red: #8b0000;
  }

  /* 1. RESET & LOCK BODY */
  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    overflow: hidden; /* Paksa body tidak bisa scroll */
    background: var(--bg-body);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    touch-action: none; /* Cegah HP me-refresh halaman saat ditarik ke bawah */
  }

  /* 2. AUTH SCREEN */
  #auth-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--primary); z-index: 99999;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .auth-card {
    background: var(--dark); padding: 30px; border-radius: 12px;
    border: 2px solid var(--gold); text-align: center; width: 100%; max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  #pass-input {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gold);
    margin: 20px 0; text-align: center; font-size: 16px; font-weight: bold;
    box-sizing: border-box;
  }
  #auth-btn {
    background: var(--gold); color: var(--primary); padding: 12px 25px;
    border: none; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer;
  }

  /* 3. MAIN CONTAINER (SCROLLER) */
  .main-wrapper {
    display: none; 
    width: 100%;
    height: 100dvh; /* dvh = Dynamic Viewport Height (Bypass Bug Layar Safari) */
    overflow: auto; /* Scroll HANYA terjadi di dalam sini */
    background: var(--bg-wrapper);
    /* BUG FIX: -webkit-overflow-scrolling dihapus agar sticky header tidak hilang! */
  }

  .grid-table {
    display: grid;
    grid-template-columns: 60px repeat(8, 140px);
    grid-auto-rows: max-content; /* Kunci presisi tinggi baris */
  }

  /* 4. STICKY ELEMENTS (ANTI-HILANG) */
  .corner {
    position: sticky; top: 0; left: 0; z-index: 1000;
    background: #000; border-bottom: 3px solid var(--gold);
    border-right: 1px solid #444;
  }

  .player-header {
    position: sticky; top: 0; z-index: 900;
    background: var(--primary);
    padding: 10px 6px;
    border-bottom: 3px solid var(--gold);
    border-right: 1px solid #2a4a35;
    /* Explicit flex untuk mencegah konten collapse */
    display: flex; flex-direction: column; justify-content: center;
  }

  .label-round {
    position: sticky; left: 0; z-index: 800;
    background: var(--dark) !important; color: var(--white) !important;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; border-bottom: 1px solid #444; border-right: 1px solid #444;
  }

  .cycle-separator {
    /* Merentangkan separator sejauh jumlah kolom */
    grid-column: 1 / -1; 
    position: sticky; left: 0; z-index: 850;
    background: #333; color: var(--gold);
    height: 38px; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 11px; letter-spacing: 2px;
    border-bottom: 1px solid #222;
  }

  /* 5. INPUT & SELECT STYLES */
  .p-input {
    width: 100%; padding: 8px; border: none;
    border-radius: 4px; font-weight: 700; font-size: 13px; text-align: center;
    box-sizing: border-box; outline: 2px solid transparent;
  }
  .p-input:focus { outline: 2px solid var(--gold); }

  .status-row { 
    color: white; display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; margin-top: 6px; padding: 0 2px;
  }

  .select-cell {
    padding: 6px; border-right: 1px solid #ddd; border-bottom: 1px solid #ddd;
    display: flex; align-items: center; justify-content: center;
  }

  select {
    width: 100%; height: 38px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 14px; font-weight: 700; text-align: center; background: #fff; color: #000;
  }

  /* ZEBRA STRIPES */
  .row-p1 { background: #ffffff; }
  .row-p2 { background: #fdfaf2; }
  .row-p3 { background: #f7f3e9; }
  .ghost-mirror { background: #e5e1da !important; border: 2px dashed var(--gold) !important; color: #555; }
  .is-out-bg { background: var(--out-red) !important; }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2 style="color:var(--gold); font-size:16px; margin-bottom:15px">"siapa player paling kece di dunia?"</h2>
    <input type="text" id="pass-input" placeholder="Ketik jawaban..." autocomplete="off">
    <button id="auth-btn" onclick="checkAuth()">MASUK</button>
  </div>
</div>

<div class="main-wrapper" id="tracker-ui">
  <div class="grid-table" id="main-grid">
    </div>
</div>

<script>
// --- AUTHENTICATION ---
function checkAuth() {
  const input = document.getElementById('pass-input').value.toLowerCase().trim();
  if (input === "bet the one and only") {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('tracker-ui').style.display = 'block';
    init(); // Generate tabel hanya setelah masuk
  } else {
    alert("Jawaban salah!");
  }
}

// --- TRACKER LOGIC ---
const grid = document.getElementById('main-grid');
const totalPlayers = 8;
const totalRounds = 21;

function init() {
  grid.innerHTML = ''; 
  let currentRow = 1; // KUNCI UTAMA: Paksa browser menetapkan baris secara manual!

  // 1. RENDER CORNER (Row 1, Col 1)
  let corner = document.createElement('div');
  corner.className = 'corner';
  corner.style.gridRow = currentRow;
  corner.style.gridColumn = 1;
  grid.appendChild(corner);

  // 2. RENDER HEADERS (Row 1, Col 2-9)
  for(let i=0; i<totalPlayers; i++) {
    let div = document.createElement('div');
    div.className = 'player-header';
    div.id = `h-${i}`;
    div.style.gridRow = currentRow;
    div.style.gridColumn = i + 2;
    div.innerHTML = `
      <input class="p-input" oninput="syncAll()" placeholder="P${i+1}">
      <div class="status-row">
        <label><input type="checkbox" class="out-check" onchange="syncAll()"> OUT</label>
        <input type="number" class="r-dead-input" value="10" oninput="syncAll()" style="width:35px; border-radius:3px; border:none; text-align:center">
      </div>
    `;
    grid.appendChild(div);
  }
  currentRow++;

  // 3. RENDER ROUNDS & CELLS
  for(let r=1; r<=totalRounds; r++) {
    
    // Pembatas Phase
    if(r === 1 || r === 8 || r === 15) {
      let phase = Math.ceil(r / 7);
      let sep = document.createElement('div');
      sep.className = 'cycle-separator';
      sep.style.gridRow = currentRow;
      sep.style.gridColumn = '1 / -1'; // Span full
      sep.innerText = `PHASE ${phase} (R${r}-${r+6})`;
      grid.appendChild(sep);
      currentRow++;
    }

    let pClass = r <= 7 ? 'row-p1' : (r <= 14 ? 'row-p2' : 'row-p3');
    
    // Label Ronde Kiri
    let label = document.createElement('div');
    label.className = `label-round ${pClass}`;
    label.style.gridRow = currentRow;
    label.style.gridColumn = 1;
    label.innerText = 'R' + r;
    grid.appendChild(label);

    // Kotak Select
    for(let c=0; c<totalPlayers; c++) {
      let cell = document.createElement('div');
      cell.className = `select-cell ${pClass}`;
      cell.style.gridRow = currentRow;
      cell.style.gridColumn = c + 2;

      let s = document.createElement('select');
      s.className = `col-${c} round-${r}`;
      s.onchange = syncAll;
      
      cell.appendChild(s);
      grid.appendChild(cell);
    }
    currentRow++;
  }
}

// --- SYNC ENGINE (TIDAK BERUBAH) ---
function syncAll() {
  const inputs = document.querySelectorAll('.p-input');
  const checks = document.querySelectorAll('.out-check');
  const deadInputs = document.querySelectorAll('.r-dead-input');
  const names = [...inputs].map((inp, idx) => inp.value.trim() || `P${idx+1}`);

  let deathData = {};
  names.forEach((n, i) => {
    deathData[n] = { isDead: checks[i].checked, round: parseInt(deadInputs[i].value) || 0 };
    document.getElementById(`h-${i}`).classList.toggle('is-out-bg', checks[i].checked);
  });

  let globalDeaths = [];
  Object.values(deathData).forEach(d => { if(d.isDead) globalDeaths.push(d.round); });

  for(let c=0; c<totalPlayers; c++) {
    let host = names[c];
    let met = [];
    for(let r=1; r<=6; r++) {
      let val = document.querySelector(`.col-${c}.round-${r}`).value;
      if(val) met.push(val);
    }
    for(let r=1; r<=7; r++) {
      let sel = document.querySelector(`.col-${c}.round-${r}`);
      let current = sel.value;
      if(r === 7 && !current) {
        let notMet = names.filter(n => n !== host && !met.includes(n));
        if(notMet.length === 1) current = notMet[0];
      }
      sel.innerHTML = '<option value="">-</option>';
      names.forEach(n => {
        if(n !== host) {
          let o = document.createElement('option');
          o.value = n; o.text = n;
          if(n === current) o.selected = true;
          sel.add(o);
        }
      });
    }
  }

  for(let c=0; c<totalPlayers; c++) {
    let host = names[c];
    let leg1 = [];
    for(let r=1; r<=7; r++) leg1.push(document.querySelector(`.col-${c}.round-${r}`).value);
    let pattern = (leg1[5] && leg1.slice(0, 5).includes(leg1[5])) ? "r6" : 
                  (leg1[6] && leg1.slice(0, 6).includes(leg1[6])) ? "r7" : "normal";
    let leftover = names.filter(n => n !== host).find(n => !leg1.includes(n)) || "";

    let leg2 = (pattern === "r6") ? [leftover, leg1[1], leg1[2], leg1[3], leg1[4], leg1[0], leg1[6]] :
               (pattern === "r7") ? [leftover, leg1[0], leg1[2], leg1[3], leg1[4], leg1[5], leg1[1]] : [...leg1];

    let full = [...leg1, ...leg2, ...leg2];

    for(let r=8; r<=totalRounds; r++) {
      let sel = document.querySelector(`.col-${c}.round-${r}`);
      let idx = r - 1;
      let shiftGlobal = 0;
      globalDeaths.forEach(dr => { if(r >= dr) shiftGlobal++; });
      idx += shiftGlobal;
      
      let enemy = full[idx];
      let st = enemy ? deathData[enemy] : null;

      sel.classList.remove('ghost-mirror');
      if(st && st.isDead && r > st.round) {
        enemy = full[idx + 3] || ""; 
        sel.classList.add('ghost-mirror');
      }
      sel.innerHTML = `<option value="${enemy || ''}">${enemy || '-'}</option>`;
      sel.value = enemy || "";
    }
  }
}
</script>
</body>
</html>
